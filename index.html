<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Protected · AI in Business Jobs</title>
<style>
  :root{--bg:#eef1f5;--surface:#fff;--ink:#10151f;--ink-2:#4a5361;--muted:#7c8698;--border:#dde3ec;--accent:#2a6ad1;--accent-soft:#e7eefb;--font-sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;--font-mono:ui-monospace,"Cascadia Code",Consolas,monospace}
  @media (prefers-color-scheme:dark){:root{--bg:#0b0e14;--surface:#141922;--ink:#f1f4f9;--ink-2:#b6c0cf;--muted:#7d8798;--border:#28303d;--accent:#5c94ea;--accent-soft:#1a2436}}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);color:var(--ink);font-family:var(--font-sans);padding:24px}
  .gate{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:30px 28px;box-shadow:0 10px 40px -12px rgba(16,21,31,.25)}
  .kicker{font-family:var(--font-mono);font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:var(--accent)}
  h1{margin:.35rem 0 .2rem;font-size:1.18rem;letter-spacing:-.01em}
  p.sub{margin:0 0 20px;color:var(--ink-2);font-size:.9rem}
  label{display:block;font-family:var(--font-mono);font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .row{display:flex;gap:8px}
  input{flex:1;padding:11px 13px;border:1px solid var(--border);border-radius:10px;background:var(--bg);color:var(--ink);font-size:1rem;font-family:var(--font-sans)}
  input:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent)}
  button{border:none;background:var(--accent);color:#fff;font-weight:600;font-size:.95rem;padding:11px 18px;border-radius:10px;cursor:pointer}
  button:disabled{opacity:.6;cursor:progress}
  .err{color:#d94f4f;font-size:.85rem;margin-top:12px;min-height:1.1em}
  .peek{border:1px solid var(--border);background:var(--bg);border-radius:10px;padding:0 12px;color:var(--ink-2);cursor:pointer;font-size:.8rem}
  .foot{margin-top:18px;color:var(--muted);font-size:.74rem;line-height:1.5}
</style>
</head>
<body>
  <main class="gate">
    <div class="kicker">Erasmus+ · Protected report</div>
    <h1>AI in Business Jobs — 2023 → 2026</h1>
    <p class="sub">Enter the password to open the findings dashboard.</p>
    <form id="f">
      <label for="pw">Password</label>
      <div class="row">
        <input id="pw" type="password" autocomplete="current-password" autofocus>
        <button type="button" class="peek" id="peek" aria-label="Show password">show</button>
      </div>
      <div style="margin-top:14px"><button id="go" type="submit">Unlock dashboard</button></div>
      <div class="err" id="err" role="alert"></div>
    </form>
    <div class="foot">This page is encrypted (AES-256-GCM). Nothing is readable without the password, and no password is sent anywhere — decryption happens in your browser.</div>
  </main>

  async function unlock(pw){
    var enc=new TextEncoder();
    var mat=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
    var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:SALT,iterations:210000,hash:"SHA-256"},mat,{name:"AES-GCM",length:256},false,["decrypt"]);
    var pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:IV},key,CT);
